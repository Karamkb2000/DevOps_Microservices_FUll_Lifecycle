name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, product-service, order-service, notification-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - run: npm ci
      - run: npm test -- --ci

  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  docker-build:
    name: Docker build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test, frontend]
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, product-service, order-service, notification-service, frontend, nginx]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ (matrix.service == 'frontend' || matrix.service == 'nginx') && format('./{0}', matrix.service) || format('./services/{0}', matrix.service) }}
          push: false
          tags: ecommerce-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
