
worker_processes  auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format json escape=json
    '{"time":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
    '"path":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
    '"rt":$request_time,"ut":"$upstream_response_time","ua":"$http_user_agent"}';
  access_log /var/log/nginx/access.log json;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 1m;


  upstream auth_upstream         { server auth-service:3001; }
  upstream product_upstream      { server product-service:3002; }
  upstream order_upstream        { server order-service:3003; }
  upstream notification_upstream { server notification-service:3004; }
  upstream frontend_upstream     { server frontend:8080; }

  server {
    listen 8080;
    server_name _;

  
    location = /healthz { return 200 'ok'; add_header Content-Type text/plain; }


    location /api/auth/         { rewrite ^/api/auth/(.*)         /$1 break; proxy_pass http://auth_upstream;         include /etc/nginx/proxy.conf; }
    location /api/products/     { rewrite ^/api/products/(.*)     /$1 break; proxy_pass http://product_upstream;      include /etc/nginx/proxy.conf; }
    location /api/orders/       { rewrite ^/api/orders/(.*)       /$1 break; proxy_pass http://order_upstream;        include /etc/nginx/proxy.conf; }
    location /api/notifications/ { rewrite ^/api/notifications/(.*) /$1 break; proxy_pass http://notification_upstream; include /etc/nginx/proxy.conf; }

   
    location / {
      proxy_pass http://frontend_upstream;
      include /etc/nginx/proxy.conf;
    }
  }
}
